server {
    listen 80;
    server_name app.descuentosyofertas.net;

    # Redirigir HTTP → HTTPS (activo después de instalar el certificado SSL)
    # Descomenta este bloque y elimina el bloque location de abajo
    # una vez que ejecutes: sudo certbot --nginx -d app.descuentosyofertas.net
    #
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Necesario para que funcionen los WebSockets de Streamlit
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}

